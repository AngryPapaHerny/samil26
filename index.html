<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학생 AI 챗봇 쇼케이스</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-anim">
        <div class="blob blob1"></div>
        <div class="blob blob2"></div>
        <div class="blob blob3"></div>
    </div>
    
    <header class="glass-nav">
        <div class="container">
            <h1>AI App Showcase</h1>
            <p>학생들이 Dify로 직접 제작한 인공지능 앱 모음입니다.</p>
        </div>
    </header>

    <main class="container">
        <div class="card-grid">
            <!-- App Card 1 -->
            <article class="glass-card" data-app-url="https://udify.app/chatbot/HEjOx4NltaKyLZns">
                <div class="card-image bg-gradient-1">
                    <span class="bot-icon">🤖</span>
                </div>
                <div class="card-content">
                    <span class="badge">Chatbot</span>
                    <h2>스마트 도우미</h2>
                    <p>사용자의 질문에 친절하게 답해주는 만능 챗봇 도우미입니다.</p>
                    <div class="card-footer">
                        <span class="author">Made by 학생 A</span>
                        <button class="launch-btn">실행하기 <span class="arrow">→</span></button>
                    </div>
                </div>
            </article>

            <!-- App Card 2 (Placeholder example) -->
            <article class="glass-card" data-app-url="https://udify.app/chatbot/HEjOx4NltaKyLZns">
                <div class="card-image bg-gradient-2">
                    <span class="bot-icon">✨</span>
                </div>
                <div class="card-content">
                    <span class="badge">Creative</span>
                    <h2>아이디어 생성기</h2>
                    <p>새로운 프로젝트 주제나 창의적인 아이디어를 제안해 줍니다.</p>
                    <div class="card-footer">
                        <span class="author">Made by 학생 B</span>
                        <button class="launch-btn">실행하기 <span class="arrow">→</span></button>
                    </div>
                </div>
            </article>

            <!-- App Card 3 (Placeholder example) -->
            <article class="glass-card" data-app-url="https://udify.app/chatbot/HEjOx4NltaKyLZns">
                <div class="card-image bg-gradient-3">
                    <span class="bot-icon">📚</span>
                </div>
                <div class="card-content">
                    <span class="badge">Education</span>
                    <h2>학습 튜터 AI</h2>
                    <p>어려운 개념을 알기 쉽게 설명해 주는 맞춤형 학습 튜터입니다.</p>
                    <div class="card-footer">
                        <span class="author">Made by 학생 C</span>
                        <button class="launch-btn">실행하기 <span class="arrow">→</span></button>
                    </div>
                </div>
            </article>
        </div>
    </main>

    <!-- Modal Overlay for Dify App -->
    <div id="app-modal" class="modal">
        <div class="modal-content glass-panel">
            <div class="modal-header">
                <h3 id="modal-app-title">AI 앱 실행</h3>
                <button id="close-modal" class="close-btn" aria-label="닫기">&times;</button>
            </div>
            <div class="modal-body">
                <div class="loader">로딩중...</div>
                <iframe 
                    id="dify-iframe"
                    src="" 
                    style="width: 100%; height: 100%; min-height: 700px"
                    frameborder="0" 
                    allow="microphone"
                    title="Dify App">
                </iframe>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
